name: 官方情報自動轉發

on:
  push:
    branches: [ main ]
    paths-ignore: [ "state/**" ]   # 記憶檔的提交不再觸發,避免無限迴圈
  schedule:
    - cron: "0 * * * *"            # 每小時檢查一次
  workflow_dispatch:

permissions:
  contents: write                  # 讓它能把「已發送記錄」寫回 repo

concurrency:
  group: news-${{ github.ref }}
  cancel-in-progress: false

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: 執行(只發新項目)
        env:
          WEBHOOK: ${{ secrets.WEBHOOK }}
          DAYS_BACK: "2"
          MAX_ITEMS: "12"
        run: python news_bot.py
      - name: 保存已發送記錄
        run: |
          if [ -n "$(git status --porcelain state)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state/sent.json
            git commit -m "chore: update sent state [skip ci]"
            git push
          else
            echo "no state change"
          fi
