name: 每週遊戲情報

on:
  push:
    branches: [ main ]        # 一有新 commit 就跑(方便即時測試)
  schedule:
    - cron: "0 1 * * 1"       # 每週一 台北 09:00 (UTC 01:00)
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - env:
          WEBHOOK: ${{ secrets.WEBHOOK }}
          DAYS_BACK: "7"
          MAX_ITEMS: "8"
        run: python news_bot.py
